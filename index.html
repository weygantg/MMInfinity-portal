<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Motto Mortgage Infinity — Loan Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Arial,Helvetica,sans-serif;background:#f4f6fa;color:#282728;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
/* Header */
.hdr{background:linear-gradient(135deg,#003057 0%,#003f72 100%);position:sticky;top:0;z-index:50;border-bottom:3px solid #FA7D00}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;max-width:600px;margin:0 auto;width:100%}
.logo-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:10px;padding:0}
.hdr-user{display:flex;align-items:center;gap:8px}
.hdr-label{color:rgba(255,255,255,0.7);font-size:12px;font-weight:600}
.logout-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif}
/* Main */
.main{flex:1;max-width:600px;margin:0 auto;width:100%;padding-bottom:80px}
/* Footer */
footer{background:linear-gradient(135deg,#1a2332,#0d1520);padding:14px 16px;text-align:center}
/* Cards */
.card{background:#fff;border-radius:18px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:12px}
/* Buttons */
.btn{border:none;border-radius:12px;padding:14px 20px;font-size:15px;font-weight:800;cursor:pointer;width:100%;font-family:Arial,sans-serif;letter-spacing:0.02em}
.btn-orange{background:linear-gradient(135deg,#FA7D00,#e06000);color:#fff;box-shadow:0 4px 16px rgba(250,125,0,0.35)}
.btn-navy{background:linear-gradient(135deg,#003057,#00488a);color:#fff}
.btn-green{background:linear-gradient(135deg,#64C887,#38c46e);color:#fff}
/* Forms */
.lbl{display:block;font-size:12px;font-weight:700;color:#666;letter-spacing:0.08em;text-transform:uppercase;margin:12px 0 5px}
.inp{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:11px 14px;font-size:14px;font-family:Arial,sans-serif;color:#282728;outline:none;transition:border-color 0.15s}
.inp:focus{border-color:#FA7D00}
select.inp{cursor:pointer}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(3px)}
.modal-box{background:#fff;border-radius:20px;padding:24px 20px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto}
/* Borrower nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8ecf2;display:flex;z-index:100;max-width:600px;margin:0 auto;box-shadow:0 -4px 20px rgba(0,0,0,0.08)}
.bnav-btn{flex:1;border:none;background:none;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-size:10px;font-weight:600;color:#9aa3b0;font-family:Arial,sans-serif;transition:color 0.15s}
.bnav-btn.active{color:#FA7D00}
/* Progress */
.progress-bar{background:#e8ecf2;border-radius:6px;height:8px;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,#FA7D00,#e06000);height:100%;border-radius:6px;transition:width 0.5s ease}
/* Conditions */
.pending-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:#fff7f0;border-radius:10px;font-size:13px;margin-bottom:8px;line-height:1.4}
.cond-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.cond-row:last-child{border-bottom:none}
/* Staff */
.sec-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.sec-tab{border:1.5px solid #e2e8f0;background:#fff;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:Arial,sans-serif;color:#666}
.sec-tab.active{background:#003057;color:#fff;border-color:#003057}
.loan-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;border:1.5px solid transparent;transition:border-color 0.15s}
.loan-card:hover{border-color:#FA7D00}
/* Urgent alert animation */
@keyframes urgentGlow{0%,100%{box-shadow:0 4px 24px rgba(200,0,0,0.35)}50%{box-shadow:0 6px 48px rgba(220,0,0,0.65),0 0 80px rgba(220,0,0,0.2)}}
@keyframes gentleShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
#go-borrower,#go-realtor,#go-staff,#go-contact{transition:transform 0.18s ease,box-shadow 0.18s ease}
#go-borrower:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 16px 48px rgba(250,125,0,0.55)}
#go-realtor:hover{transform:translateY(-4px) scale(1.03);box-shadow:0 12px 36px rgba(100,200,135,0.55)}
#go-staff:hover{transform:translateY(-4px) scale(1.03);box-shadow:0 12px 36px rgba(0,125,195,0.55)}
#go-contact:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(255,255,255,0.12)}
.urgent-alert{animation:urgentGlow 3s ease-in-out infinite,gentleShake 2.5s ease-in-out infinite;background:#fff}
/* FAQ */
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:13px 0;cursor:pointer;font-size:14px;font-weight:700;color:#003057;border-bottom:1px solid #f0f0f0;gap:10px}
.faq-ans{display:none;padding:10px 0 14px;font-size:13px;line-height:1.75;color:#555}
.faq-ans.show{display:block}
/* Road CSS */
.road-strip{position:absolute;left:50%;transform:translateX(-50%);width:44px;top:0;bottom:0;background:linear-gradient(to bottom,#d4c8b8,#c8baa8);border-radius:6px;z-index:0}
.step-row{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;margin-bottom:4px}
.step-inner{display:flex;align-items:center;width:100%;min-height:82px}
.step-inner.left{flex-direction:row}
.step-inner.right{flex-direction:row-reverse}
.step-circle-wrap-left{width:50%;display:flex;justify-content:flex-end;padding-right:27px}
.step-circle-wrap-right{width:50%;display:flex;justify-content:flex-start;padding-left:27px}
.step-circle{border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;position:relative;transition:transform 0.15s;font-family:Arial,sans-serif}
.step-circle.done{background:linear-gradient(135deg,#64C887,#38c46e);border:3px solid #38a060;box-shadow:0 3px 12px rgba(100,200,135,0.4);color:#fff}
.step-circle.current{background:linear-gradient(135deg,#003057,#00488a);border:4px solid #FA7D00;box-shadow:0 0 0 8px rgba(250,125,0,0.15),0 5px 20px rgba(0,48,87,0.35);color:#fff}
.step-circle.future{background:#e8ecf2;border:2.5px solid #d0d6e0;color:#9aa3b0}
.here-tag{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#FA7D00,#e06000);color:#fff;font-size:7px;font-weight:900;border-radius:8px;padding:2px 6px;white-space:nowrap;letter-spacing:0.05em;box-shadow:0 2px 8px rgba(250,125,0,0.4)}
.step-label-left{width:50%;padding-left:12px;padding-right:24px}
.step-label-right{width:50%;padding-right:12px;padding-left:24px;text-align:right}
.step-detail{display:none;background:#f8fafc;border-radius:12px;padding:14px;margin:6px 16px 10px;font-size:14px;line-height:1.75;color:#444}
.step-detail.show{display:block}
.step-detail.done-detail{background:#f0faf4}
.link-btn{background:transparent;border:none;color:#FA7D00;font-size:12px;font-weight:700;cursor:pointer;padding:2px 0;text-decoration:underline;text-underline-offset:2px;font-family:Arial,sans-serif}
textarea.inp{min-height:80px;resize:vertical}
</style>
</head>

  {id:"appr_paid",    s:"Appraisal Paid",       e:"🏠",msg:"The appraisal fee has been paid. The appraiser will schedule their visit shortly.",sms:"The appraisal fee has been paid! The appraiser will now schedule their visit to the property.",detail:"The appraisal fee has been collected and the appraiser is scheduling their property visit. This fee is part of your closing costs and is typically paid upfront before the appraisal is conducted."},
  {id:"appr_received",s:"Appraisal Received",   e:"🏠",msg:"The appraisal has been received. Your home value has been confirmed!",sms:"The appraisal is back! Your home value has been confirmed. Things are moving along nicely.",detail:"The appraisal report has been received and submitted to the lender. The lender will now take a couple of days to review it and determine whether the property value supports your loan amount. During this review, the lender may also require additional conditions, such as repairs to the property, before moving forward. We will keep you updated as soon as we hear back. No action needed from you right now."},
  {id:"title_ordered",s:"Title Ordered",        e:"📜",msg:"A title search has been ordered on your property.",sms:"A title search has been ordered on the property to confirm clear ownership. No action needed from you.",detail:"A title company is searching public records to confirm the seller has clear ownership and there are no outstanding liens, judgments, or legal issues. Think of it as a background check on the home's ownership history."},
  {id:"title_received",s:"Title Received",      e:"📜",msg:"Title has been received and reviewed. The property has a clean history!",sms:"Title has come back clean! The property has a clear ownership history and is ready to transfer at closing.",detail:"The title search is complete and clear. There are no ownership issues or surprises. The home is ready to be legally transferred to you at closing. Title insurance will be issued to protect you."},
  {id:"ins_quoted",   s:"Insurance Quoted",     e:"🛡️",msg:"Insurance quotes have been sent to you. Please review and choose your provider.",sms:"Your homeowners insurance quotes are ready! Please review them and select the provider you want to use.",detail:"It is time to choose your homeowners insurance! We have sent you quotes from several providers for your review. Please look them over and select the one you want to move forward with. Keep in mind, we are not licensed insurance agents, so all coverage questions should be directed to the agent you choose. Once you have made your decision, you must contact your chosen agent directly so they can bind the policy and send the confirmation to us. We cannot move forward until the insurance is bound and received."},
  {id:"ins_bound",    s:"Insurance Bound",      e:"🔐",msg:"Your homeowners insurance has been bound and confirmed. You are protected!",sms:"Your homeowners insurance is bound and confirmed on file with the lender. You are protected!",detail:"Your homeowners insurance policy has been bound and the lender has a copy on file. This is required before closing. If your property is in a flood zone, your flood insurance has also been confirmed."},
  {id:"clearing",     s:"Conditions Clearing",  e:"🗂️",msg:"We are reviewing your final documents. Almost there. Respond quickly to any requests!",sms:"We are clearing the final conditions. Please respond quickly to any document requests.",detail:"The underwriter is reviewing your final documents and clearing remaining conditions. You are in the home stretch! Please respond to any final document requests as quickly as possible. PDFs only. No screenshots."},
  {id:"cd_sent",      s:"CD Sent",              e:"📬",msg:"Your Closing Disclosure has been sent. Review it carefully. You have 3 business days.",sms:"Your Closing Disclosure has been sent! Please review it carefully and compare it to your Loan Estimate.",detail:"Your Closing Disclosure has been sent! Important: the CD is NOT the final number. We are still collecting final fees from the title company and other parties, so figures may change slightly before closing. Federal law requires you receive the CD at least 3 business days before closing. You are required to eSign it the same day you receive it. Please do not delay. Review it carefully and call us immediately with any questions."},
  {id:"ctc",          s:"Clear to Close!",      e:"🏆",msg:"CONGRATULATIONS! You are CLEAR TO CLOSE! Every condition has been satisfied!",sms:"CONGRATULATIONS! Your loan is officially CLEAR TO CLOSE! I will be reaching out shortly to schedule your closing. You did it!",detail:"THIS IS IT! Every single condition has been satisfied and your loan is FULLY APPROVED! From the day you first reached out to us to right now, you trusted us with one of the biggest financial decisions of your life and we did not take that lightly. Your closing date is set, your loan documents are ready, and the keys are almost in your hand. Bring your government-issued photo ID and certified funds. You are about to be a homeowner! If we earned it, we would love a Google review. It only takes 60 seconds and means the world to us. <a href='https://g.page/r/CY4Io13bpu5eEBM/review' target='_blank' style='color:#FA7D00;font-weight:800;text-decoration:underline'>Tap here to leave a review</a>. Thank you for letting us be part of your journey!"},
  {id:"closing_sched",s:"Closing Scheduled",    e:"🗓️",msg:"Your closing date and time are confirmed. Get ready for your keys!",sms:"Your closing is scheduled! Remember to bring your government-issued photo ID. Closing funds must be by wire or cashier check.",detail:"You are almost there! The title company will be calling you to confirm the date, time, location and the exact amount of funds you will need to wire to them. Please bring your government-issued photo ID to closing. All funds must be paid by wire transfer or cashier check. Personal checks are not accepted."},
  {id:"closed",       s:"Closed!",              e:"🎉",msg:"CONGRATULATIONS! You are officially a HOMEOWNER! Welcome home!",sms:"CONGRATULATIONS! You are officially a HOMEOWNER! It was an honor working with you. Remember to apply for your Florida Homestead Exemption by March 1st!",detail:"CONGRATULATIONS! YOU ARE A HOMEOWNER! The keys are yours and we could not be more proud to have been part of your journey. Do not forget to apply for your Florida Homestead Exemption by March 1st of next year to save on property taxes. Before you go, please take a moment to explore the resources we have put together for you right here in the app. Tap the FAQ tab for answers to common questions that come up after closing, including information on your escrow account, what to expect if your loan is transferred to a new servicer, and how to protect yourself from solicitations. We are always here if you need us. Welcome home!"},
];

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");}
function fmtDate(d){if(!d)return "";var p=d.split("-");if(p.length!==3)return d;return p[1]+"/"+p[2]+"/"+p[0];}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function mIdx(id){const i=MS.findIndex(m=>m.id===id);return i<0?0:i;}
function findMs(id){return MS.find(m=>m.id===id)||MS[0];}
function findLO(nmls){return LOS.find(l=>l.nmls===nmls)||null;}
function findOffice(id){return OFFICES.find(o=>o.id===id)||OFFICES[0];}
function getThemeEmoji(loan,i){const t=EMOJI_THEMES.find(t=>t.id===(loan.loanTheme||"celebrate"));return t?t.emoji[Math.min(i,t.emoji.length-1)]:"⭐";}
function initConds(arr){const o={};arr.forEach(c=>o[c.id]=false);return o;}
function makeLoan(loNmls){
  return{id:genId(),lastName:"",address:"",closingDate:"",officeId:"ftm",loNmls:loNmls||"",loPhone:"",processor:"",
    borrowerPhone:"",borrowerEmail:"",mlsNumber:"",homePhotoUrl:"",
    listingAgentName:"",listingAgentPhone:"",buyerAgentName:"",buyerAgentPhone:"",
    milestone:"app_received",bConds:initConds(BSTD),rConds:initConds(RSTD),
    custB:[],custR:[],bNote:"",rNote:"",notes:"",
    borrowerUser:"",borrowerPass:"",realtorUser:"",realtorPass:"",
    loanTheme:"celebrate",createdAt:new Date().toISOString()};
}
function saveLoans(){try{localStorage.setItem("mmi_loans",JSON.stringify(ST.loans));}catch(e){}}
function loadLoans(){
  try{const s=localStorage.getItem("mmi_loans");if(s){ST.loans=JSON.parse(s);}}catch(e){}
  // Seed demo loan if not already present
  var SEED_ID="demo-amos-138";
  var existing=ST.loans.find(function(l){return l.id===SEED_ID;});
  if(!existing){
    ST.loans.unshift({
      id:SEED_ID,
      lastName:"Amos",
      address:"138 Burnt Pine Dr",
      closingDate:"",
      officeId:"ftm",
      loNmls:"2221205",
      borrowerPhone:"",

      homePhotoUrl:"",

      bNote:"Welcome to your loan portal! Your loan has received a Conditional Approval. We are working through the remaining conditions and will keep you updated every step of the way.",
      rNote:"Your file is in Conditional Approval. See below for items outstanding from you.",
      notes:"Demo file for internal testing.",
      borrowerUser:"amos138",
      borrowerPass:"MMI2026",
      realtorUser:"",
      realtorPass:"",
      loanTheme:"celebrate"
    });
    saveLoans();
  } else {
    // Force-clear old realtor credentials on existing seed loan
    if(existing.realtorUser==="amos138"){existing.realtorUser="";existing.realtorPass="";saveLoans();}
    if(existing.rNote&&existing.rNote.indexOf("checklist")>-1){existing.rNote="Your file is in Conditional Approval. See below for items outstanding from you.";saveLoans();}
  }
}

// ── Header ────────────────────────────────────────────────────────────────────
function buildHeader(){
  let label="";
  if(ST.session){
    if(ST.session.type==="staff") label=esc(ST.session.staffUser.name)+(ST.session.staffUser.role==="admin"?" (Admin)":" (LO)");
    else if(ST.session.type==="borrower") label="Borrower Portal";
    else if(ST.session.type==="realtor") label="Realtor Portal";
  }
  const userHtml=label?'<div class="hdr-user"><div class="hdr-label">'+label+'</div><button class="logout-btn" data-a="lgOut">Logout</button></div>':"";
  return '<div class="hdr"><div class="hdr-inner"><button class="logo-btn" data-a="lgOut">'+buildMottoLogo()+'<div style="border-left:1px solid rgba(255,255,255,0.18);padding-left:10px"><div style="color:#fff;font-weight:900;font-size:15px;letter-spacing:0.22em">INFINITY</div></div></button>'+userHtml+'</div></div>';
}

// ── Login Screen ───────────────────────────────────────────────────────────────
function buildLogin(type){
  const info={
    borrower:{t:"Borrower Portal",s:"Sign in to track your loan on our roadmap",c:"linear-gradient(135deg,#FA7D00,#e06000)"},
    realtor: {t:"Realtor Portal", s:"Sign in to view your client files",          c:"linear-gradient(135deg,#64C887,#38c46e)"},
    staff:   {t:"Staff Portal",   s:"LO and Admin access",                         c:"linear-gradient(135deg,#007DC3,#0096e6)"},
  }[type];
  if(!info) return "";
  return '<div style="padding:20px 16px"><div style="background:'+info.c+';border-radius:18px;padding:24px 20px;text-align:center;margin-bottom:20px"><div style="color:#fff;font-weight:900;font-size:22px;margin-bottom:4px">'+info.t+'</div><div style="color:rgba(255,255,255,0.8);font-size:13px">'+info.s+'</div></div>'
    +'<div class="card"><button data-a="goBack" style="background:none;border:none;color:#666;font-size:13px;cursor:pointer;font-family:Arial,sans-serif;margin-bottom:14px;padding:0">&lsaquo; Back</button>'
    +'<label class="lbl">Username</label><input class="inp" id="li_u" type="text" placeholder="Enter username" autocomplete="username">'
    +'<label class="lbl">Password</label><input class="inp" id="li_p" type="password" placeholder="Enter password" autocomplete="current-password">'

    +'<button class="btn btn-orange" style="margin-top:14px" data-a="doLogin" data-t="'+type+'">Sign In &rarr;</button></div></div>';
}

// ── Borrower Home Screen ───────────────────────────────────────────────────────
function buildBorrowerHome(loan){
  const mi=mIdx(loan.milestone);
  const cur=findMs(loan.milestone);
  const prog=Math.round((mi/(MS.length-1))*100);
  const pendingCnt=BSTD.filter(c=>!(loan.bConds&&loan.bConds[c.id])).length+(loan.custB||[]).filter(c=>!c.checked).length;
  const lo=findLO(loan.loNmls);
  const isCtc=CTC_IDS.includes(loan.milestone);
  const isClosed=loan.milestone==="closed";
  const stepEmoji=getThemeEmoji(loan,mi);
  const statusColor=isClosed?"#64C887":isCtc?"#FA7D00":"#A4BCC2";

  let daysHtml="";
  if(loan.closingDate){
    const d=Math.round((new Date(loan.closingDate)-new Date())/(864e5));
    if(!isNaN(d)&&d>0) daysHtml='<div style="flex-shrink:0;background:#fff;border-radius:14px;padding:12px 14px;min-width:96px;box-shadow:0 2px 12px rgba(0,0,0,0.07);text-align:center"><div style="font-size:22px;font-weight:900;color:#FA7D00;margin-bottom:4px">'+d+'</div><div style="font-size:11px;font-weight:800;color:#282728">Days to<br>Closing</div></div>';
    else if(!isNaN(d)&&d===0) daysHtml='<div style="flex-shrink:0;background:linear-gradient(135deg,#FA7D00,#e06000);border-radius:14px;padding:12px 14px;min-width:96px;box-shadow:0 2px 12px rgba(250,125,0,0.3);text-align:center"><div style="font-size:16px;font-weight:900;color:#fff;margin-bottom:4px">TODAY!</div><div style="font-size:11px;font-weight:800;color:rgba(255,255,255,0.8)">Closing<br>Day</div></div>';
    else daysHtml='<div style="flex-shrink:0;background:#fff;border-radius:14px;padding:12px 14px;min-width:96px;box-shadow:0 2px 12px rgba(0,0,0,0.07);text-align:center"><div style="font-size:13px;font-weight:900;color:#003057;margin-bottom:4px">'+fmtDate(loan.closingDate)+'</div><div style="font-size:11px;font-weight:800;color:#282728">Closing<br>Date</div></div>';
  }

  // Chevron step strip
  var N=MS.length,chevW=56,chevH=80,arr=12,gap=0;
  var ctcIdx=MS.findIndex(function(m){return m.id==="ctc";});
  var chevrons="";
  var pos=0;
  for(var ci=0;ci<N;ci++){
    var m=MS[ci],done=ci<mi,isCur=ci===mi;
    var emoji=getThemeEmoji(loan,ci);
    var x=pos*(chevW+gap);
    var isFirst=pos===0;
    var pts2=isFirst
      ?"0,0 "+(chevW+arr)+",0 "+(chevW+arr*2)+","+(chevH/2)+" "+(chevW+arr)+","+chevH+" 0,"+chevH
      :arr+",0 "+(chevW+arr)+",0 "+(chevW+arr*2)+","+(chevH/2)+" "+(chevW+arr)+","+chevH+" "+arr+","+chevH+" 0,"+(chevH/2);
    var fill=isCur?"#FA7D00":done?"#64C887":"#1a3050";
    var textColor=isCur?"#fff":done?"#fff":"rgba(255,255,255,0.5)";
    var numColor=isCur?"rgba(255,255,255,0.9)":done?"rgba(255,255,255,0.8)":"rgba(255,255,255,0.3)";

// ── Road Map (chevron grid) ───────────────────────────────────────────────────
function buildRoadMap(loan){
  var mi=mIdx(loan.milestone);
  var prog=Math.round((mi/(MS.length-1))*100);
  var chevW=70,chevH=130,arr=15,perRow=5;
  function makeRow(steps,rowIdx){
    var svgW=chevW*steps.length+arr*2;
    var chevs=steps.map(function(item,j){
      var ci=item.ci,m=item.m,done=item.done,isCur=item.isCur;
      var emoji=getThemeEmoji(loan,ci);
      var x=j*chevW;
      var isFirst=j===0,isLast=j===steps.length-1;
      var pts=isFirst
        ?"0,0 "+(chevW+arr)+",0 "+(chevW+arr*2)+","+(chevH/2)+" "+(chevW+arr)+","+chevH+" 0,"+chevH
        :arr+",0 "+(chevW+arr)+",0 "+(chevW+arr*2)+","+(chevH/2)+" "+(chevW+arr)+","+chevH+" "+arr+","+chevH+" 0,"+(chevH/2);
      if(isLast&&!isFirst) pts=arr+",0 "+(chevW+arr)+",0 "+(chevW+arr)+","+chevH+" "+arr+","+chevH+" 0,"+(chevH/2);
      if(isFirst&&isLast) pts="0,0 "+(chevW+arr)+",0 "+(chevW+arr)+","+chevH+" 0,"+chevH;
      var fill=isCur?"#FA7D00":done?"#1d5c8a":"#1a3050";
      var stroke=isCur?"#fff":done?"#2a7ab8":"#0d1f35";
      var cx=isFirst?(chevW+arr)/2:arr+(chevW/2);
      var lbl=m.s.length>9?m.s.slice(0,9)+"..":m.s;
      var numColor=isCur?"rgba(255,255,255,0.95)":done?"rgba(255,255,255,0.7)":"rgba(255,255,255,0.3)";
      var lblColor=isCur?"#fff":done?"#fff":"rgba(255,255,255,0.45)";
      return "<g transform=\"translate("+x+",0)\" data-a=\"tS\" data-i=\""+ci+"\" style=\"cursor:pointer\">"
        +"<polygon points=\""+pts+"\" fill=\""+fill+"\" stroke=\""+stroke+"\" stroke-width=\"1.5\"/>"
        +"<text x=\""+cx+"\" y=\"14\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"10\" font-weight=\"700\" fill=\""+numColor+"\">STEP</text>"
        +"<text x=\""+cx+"\" y=\"30\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"20\" font-weight=\"900\" fill=\""+numColor+"\">"+String(ci+1).padStart(2,"0")+"</text>"
        +"<text x=\""+cx+"\" y=\""+(chevH/2+8)+"\" text-anchor=\"middle\" dominant-baseline=\"middle\" font-size=\""+(isCur?"26":"22")+"\">"+( done?"✅":emoji)+"</text>"
        +"<text x=\""+cx+"\" y=\""+(chevH-9)+"\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"9\" font-weight=\""+(isCur?"800":"600")+"\" fill=\""+lblColor+"\">"+lbl+"</text>"
        +(isCur?"<polygon points=\""+pts+"\" fill=\"none\" stroke=\"rgba(255,255,255,0.4)\" stroke-width=\"2.5\"/>":"")
        +"</g>";
    }).join("");
    return "<div style=\"margin-bottom:2px\"><svg viewBox=\"0 0 "+svgW+" "+chevH+"\" width=\"100%\" height=\"auto\" xmlns=\"http://www.w3.org/2000/svg\" style=\"display:block\">"+chevs+"</svg></div>";
  }
  var rows="";
  var i=0;
  while(i<MS.length){
    var batch=[];
    for(var j=0;j<perRow&&i<MS.length;j++,i++){
      batch.push({ci:i,m:MS[i],done:i<mi,isCur:i===mi});
    }
    rows+=makeRow(batch,Math.floor(i/perRow));
  }
  return '<div style="background:#0c1a2e;min-height:calc(100vh - 130px);padding:14px 16px 20px">'
    +'<div style="background:linear-gradient(135deg,#003057,#00488a);border-radius:14px;padding:16px;margin-bottom:14px">'
    +'<div style="color:#FA7D00;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:4px">Your Loan Progress</div>'
    +'<div style="color:#fff;font-weight:900;font-size:20px;margin-bottom:2px">Step '+(mi+1)+' of '+MS.length+'</div>'
    +'<div style="color:rgba(255,255,255,0.6);font-size:13px">'+prog+'% Complete. Tap any step for details.</div></div>'
    +rows
    +'</div>';
}

// ── FAQ ───────────────────────────────────────────────────────────────────────
function buildFAQ(){
  var cats=[
    {t:"The Mortgage Process",qs:[
      ["What are the steps in the mortgage process?","Application → Submission to Lender → Conditional Approval → Appraisal (Ordered, Paid, Received) → Title (Ordered, Received) → Insurance (Quoted, Bound) → Conditions Clearing → CD Sent → Clear to Close → Closing Scheduled → Closed. Each step is tracked on your My Progress tab."],
      ["How long does the process take?","We have closed loans in as little as 3 days and we average about two weeks. While that is not typical for the industry, we move fast. A typical purchase mortgage takes 30-45 days from application to closing, and some down payment assistance programs can take up to 45 days. How quickly we close really comes down to how quickly you respond when we ask for documentation. The faster you get us what we need, the faster we can get you to the closing table. We always strive to close as quickly as possible to keep the stress at bay and avoid last minute surprises."],
      ["How will I know where my loan stands?","You always know exactly where you are in the process right here in this app. Your My Progress tab is updated by our team every time a milestone is reached. You will also hear directly from us when something important happens or when we need something from you. You are never left wondering."],
      ["What could slow down or stop my loan from closing?","The most common reasons a loan gets delayed or denied are: missing or incomplete documents, large unexplained bank deposits or withdrawals, a new debt or credit inquiry, a job change, or an appraisal that comes in below the purchase price. The good news is that most of these are completely avoidable. Follow the 5 tips at the top of this page and stay in close communication with our team and you give yourself the best possible chance of a smooth and on-time closing."],
    ]},
    {t:"Your Documents",qs:[
      ["What documents do I need?","ALL documents must be submitted in PDF format. Clear, legible, ALL pages. No screenshots accepted. Required: Government-issued Photo ID, Social Security Card, W-2s (last 2 years), Pay Stubs (covering one full month), Bank Statements (last 2 months, ALL pages, ALL accounts), Federal Tax Returns (last 2 years, ALL pages, ALL schedules). Self-employed borrowers also need: Business License, Business Returns, a Profit and Loss Statement, and a Year-to-Date Balance Sheet."],
      ["Why PDF only?","Lenders require PDFs for all documents. Screenshots are blurry, miss pages, and will be rejected and cause delays. Always download the official PDF from your bank or employer portal."],
      ["How do I submit documents?","Always email your documents directly to our loan processing team at glenda.weygant@mottomortgage.com and alex.zimmer@mottomortgage.com. Please include your last name in the subject line so we can match it to your file quickly."],
      ["What if a document is missing pages?","If your bank statement is 12 pages, we need all 12 pages including any blank pages. Even if a page is blank, the lender requires it to confirm no pages were removed or hidden. A document with missing pages will be rejected and cause delays. Always download the complete document directly from your bank or employer portal."],
      ["Why does the lender keep asking for more documents?","Underwriters are required to verify and document every aspect of your financial picture. It may feel repetitive but each request has a specific reason. The fastest way through it is to provide exactly what is asked, in PDF format, as quickly as possible."],
    ]},
    {t:"Understanding Closing Costs",qs:[
      ["What are closing costs?","Closing costs typically run 2-5% of the loan amount. They include lender fees, title insurance, appraisal fee, prepaid interest, homeowners insurance, and property taxes. <strong>We are required by law to over-disclose these amounts upfront, so the initial estimate you see may look higher than what you actually end up paying.</strong> As the process moves forward and we collect final numbers from the title company and other parties, the amounts tend to tighten up and often come down. You will receive a detailed Loan Estimate at application and a Closing Disclosure before closing."],
      ["Will my closing costs change between the Loan Estimate and the Closing Disclosure?","Yes, and that is completely normal. The Loan Estimate is prepared early in the process when many of the final numbers are not yet confirmed. As we get closer to closing and collect final figures from the title company, insurance provider, and other parties, the numbers tighten up. In most cases the final costs come in at or below the estimate. We are required by law to over-disclose upfront so do not be alarmed by the initial numbers."],
      ["Who pays closing costs, the buyer or the seller?","Typically the buyer pays their own closing costs, but in many transactions the seller agrees to contribute a credit toward the buyer's closing costs as part of the purchase negotiation. This is called a seller concession. Your real estate agent negotiates this on your behalf. Ask your loan officer how a seller credit could be applied to your specific situation."],
      ["What is prepaid interest and why do I have to pay it?","Prepaid interest covers the interest that accrues on your loan from your closing date to the end of that month. For example if you close on the 15th, you prepay interest for the remaining days of that month. Your first full mortgage payment is then due on the 1st of the following month. The later in the month you close, the less prepaid interest you owe."],
      ["What is a closing cost credit?","A seller or lender credit can be used to offset your closing costs. This is negotiated as part of your purchase contract or loan terms. Ask your loan officer if this is an option for your situation."],
      ["What do I need to bring to closing?","Bring your government-issued photo ID. All funds must be paid by wire transfer or cashier check. Personal checks are not accepted. The title company will contact you with the exact amount you need to wire before your closing date."],
    ]},
  ];
  var html='<div style="padding:14px 16px;background:#f4f6fa;min-height:calc(100vh - 130px)">'
    +'<div style="background:linear-gradient(135deg,#003057,#00488a);border-radius:14px;padding:20px 16px;margin-bottom:14px">'
    +'<div style="color:#FA7D00;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:6px">Knowledge Base</div>'
    +'<div style="color:#fff;font-weight:900;font-size:22px;margin-bottom:4px">Mortgage FAQ</div>'
    +'<div style="color:#A4BCC2;font-size:13px">Tap any question to expand the answer</div></div>';
  // 5 Tips warning box at top
  html+='<div style="margin-bottom:14px;background:#fff;border:2.5px solid #cc0000;border-radius:14px;overflow:hidden">'
    +'<div style="background:#cc0000;padding:10px 16px;display:flex;align-items:center;gap:8px">'
    +'<div style="font-size:18px">⚠️</div>'
    +'<div style="color:#fff;font-weight:900;font-size:13px;text-transform:uppercase;letter-spacing:0.1em">5 Tips for a Smooth Closing</div>'
    +'</div>'
    +'<div style="padding:4px 0">';
  var tips=[
    ["Respond quickly to all requests","Time is of the essence. When our team asks for a document it is because the lender has requested it. Providing exactly what is requested is paramount to a smooth and timely closing. Please respond to all requests within 24 hours."],
    ["Don't make any large deposits or withdrawals","All unusual bank activity must be explained in writing. Keep your financial activity normal throughout the entire loan process."],
    ["Don't make any major purchases","No new cars, furniture, or appliances on credit until after closing. New debt can change your debt-to-income ratio and jeopardize your loan."],
    ["Don't change jobs during the process","Employment changes must be disclosed immediately. A job change can affect your qualifying income."],
    ["Don't apply for new credit","Each new credit inquiry can lower your score and affect your loan terms. Wait until after closing."],
  ];
  tips.forEach(function(q,qi){
    var qid="tip_"+qi;
    html+='<div class="faq-q" style="padding:12px 16px;border-bottom:1px solid #f0f0f0" onclick="toggleTip('+qi+')"><span style="color:#cc0000;font-weight:800">'+q[0]+'</span><span id="tipt'+qi+'" style="color:#cc0000;font-size:18px;font-weight:300;flex-shrink:0">+</span></div>'
      +'<div class="faq-ans" id="'+qid+'" style="padding:10px 16px 14px;font-size:13px;line-height:1.75;color:#555">'+q[1]+'</div>';
  });
  html+='</div></div>';

  cats.forEach(function(cat,ci){
    html+='<div class="card" style="margin-bottom:12px">'
      +'<div style="font-weight:900;font-size:13px;color:#FA7D00;text-transform:uppercase;letter-spacing:0.1em;padding-bottom:8px;border-bottom:2px solid #FA7D00;margin-bottom:4px">'+cat.t+'</div>';
    cat.qs.forEach(function(q,qi){
      var qid="fa"+ci+"_"+qi;
      html+='<div class="faq-q" onclick="toggleFaq('+ci+','+qi+')"><span>'+q[0]+'</span><span id="ft'+ci+'_'+qi+'" style="color:#FA7D00;font-size:18px;font-weight:300;flex-shrink:0">+</span></div>'
        +'<div class="faq-ans" id="'+qid+'">'+q[1]+'</div>';
    });
    html+='</div>';
  });
  return html+'</div>';
}
function toggleFaq(ci,qi){
  var ans=document.getElementById("fa"+ci+"_"+qi);
  var tog=document.getElementById("ft"+ci+"_"+qi);
  if(!ans)return;
  var showing=ans.classList.contains("show");
  document.querySelectorAll(".faq-ans").forEach(function(el){el.classList.remove("show");});
  document.querySelectorAll("[id^='ft']").forEach(function(el){if(el)el.textContent="+";});
  if(!showing){ans.classList.add("show");if(tog)tog.textContent="−";}
}
function toggleTip(qi){
  var ans=document.getElementById("tip_"+qi);
  var tog=document.getElementById("tipt"+qi);
  if(!ans)return;
  var showing=ans.classList.contains("show");
  document.querySelectorAll(".faq-ans").forEach(function(el){el.classList.remove("show");});
  document.querySelectorAll("[id^='ft'],[id^='tipt']").forEach(function(el){if(el)el.textContent="+";});
  if(!showing){ans.classList.add("show");if(tog)tog.textContent="−";}
}

// ── Realtor View ──────────────────────────────────────────────────────────────
function buildRealtorProgress(loan){
  var mi=mIdx(loan.milestone);
  var chevW=58,chevH=90,arr=13,perRow=5;
  function makeRow(steps){
    var n=steps.length;
    var svgW=n*chevW+arr*2;
    var chevs=steps.map(function(item,j){
      var ci=item.ci,m=item.m,done=item.done,isCur=item.isCur;
      var emoji=getThemeEmoji(loan,ci);
      var x=j*chevW;
      var isFirst=j===0,isLast=j===n-1;
      var pts=isFirst
        ?"0,0 "+(chevW+arr)+",0 "+(chevW+arr*2)+","+(chevH/2)+" "+(chevW+arr)+","+chevH+" 0,"+chevH
        :arr+",0 "+(chevW+arr)+",0 "+(chevW+arr*2)+","+(chevH/2)+" "+(chevW+arr)+","+chevH+" "+arr+","+chevH+" 0,"+(chevH/2);
      if(isLast&&!isFirst) pts=arr+",0 "+(chevW+arr)+",0 "+(chevW+arr)+","+chevH+" "+arr+","+chevH+" 0,"+(chevH/2);
      if(isFirst&&isLast) pts="0,0 "+(chevW+arr)+",0 "+(chevW+arr)+","+chevH+" 0,"+chevH;
      var fill=isCur?"#FA7D00":done?"#1d5c8a":"#1a3050";
      var stroke=isCur?"#fff":done?"#2a7ab8":"#0d1f35";
      var cx=isFirst?(chevW+arr)/2:arr+(chevW/2);
      var lbl=m.s.length>8?m.s.slice(0,8)+"..":m.s;
      return "<g transform='translate("+x+",0)'>"
        +"<polygon points='"+pts+"' fill='"+fill+"' stroke='"+stroke+"' stroke-width='1.5'/>"
        +"<text x='"+cx+"' y='14' text-anchor='middle' font-family='Arial' font-size='8' font-weight='700' fill='"+(isCur?"rgba(255,255,255,0.9)":done?"rgba(255,255,255,0.7)":"rgba(255,255,255,0.3)")+"'>"+String(ci+1).padStart(2,"0")+"</text>"
        +"<text x='"+cx+"' y='"+(chevH/2+6)+"' text-anchor='middle' dominant-baseline='middle' font-size='"+(isCur?"18":"14")+"'>"+(done?"✅":emoji)+"</text>"
        +"<text x='"+cx+"' y='"+(chevH-9)+"' text-anchor='middle' font-family='Arial' font-size='7.5' font-weight='"+(isCur?"800":"600")+"' fill='"+(isCur?"#fff":done?"#fff":"rgba(255,255,255,0.45)")+"'>"+lbl+"</text>"
        +"</g>";
    }).join("");
    return '<div style="margin-bottom:3px;background:#0c1a2e;border-radius:8px;overflow:hidden"><svg viewBox="0 0 '+svgW+' '+chevH+'" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" style="display:block">'+chevs+'</svg></div>';
  }
  var rows="",i=0;
  while(i<MS.length){
    var batch=[];
    for(var j=0;j<perRow&&i<MS.length;j++,i++) batch.push({ci:i,m:MS[i],done:i<mi,isCur:i===mi});
    rows+=makeRow(batch);
  }
  return rows;
}

function doLogin(type){
  var u=(document.getElementById("li_u")||{}).value.trim().toLowerCase()||"";
  var p=(document.getElementById("li_p")||{}).value.trim().toLowerCase()||"";
  var err=document.getElementById("li_err");
  if(type==="staff"){
    var su=STAFF.find(function(s){return s.u.toLowerCase()===u&&s.p.toLowerCase()===p;});
    if(su){ST.session={type:"staff",staffUser:su};ST.view="staff";ST.staffView="dash";render();}
    else{if(err)err.style.display="block";}
  } else if(type==="borrower"){
    var loan=ST.loans.find(function(l){return l.borrowerUser.toLowerCase()===u&&l.borrowerPass.toLowerCase()===p;});
    if(loan){ST.session={type:"borrower",loanId:loan.id,username:u};ST.bTab="home";ST.view="borrower";render();}
    else{if(err)err.style.display="block";}
  } else if(type==="realtor"){
    var rl=ST.loans.find(function(l){return l.realtorUser.toLowerCase()===u&&l.realtorPass.toLowerCase()===p;});
    if(rl){ST.session={type:"realtor",username:u};ST.view="realtor";render();}
    else{if(err)err.style.display="block";}
  }
}

// ── Click Handler ─────────────────────────────────────────────────────────────
document.addEventListener("click",function(e){
  var el=e.target.closest("[data-a]");
  if(!el) return;
  var a=el.getAttribute("data-a");
  switch(a){
    case "lgOut": doLogout(); break;
    case "goBack": showLandingStatic(); render(); break;
    case "doLogin": doLogin(el.getAttribute("data-t")); break;
    case "sBTab": setBTab(el.getAttribute("data-t")); break;
    case "goCL": ST.bTab="map"; ST.session.showChecklist=true; renderMain(); break;
    case "gReview": window.open("https://g.page/r/CY4Io13bpu5eEBM/review","_blank"); break;
    case "selR": setRealtorSel(el.getAttribute("data-id")); break;
    case "tS": toggleStep(parseInt(el.getAttribute("data-i")||"0")); break;
    case "cM": case "cM-overlay": ST.smsPrompt=null;renderModal(); break;
    case "newLoan":
      var lo=ST.session.staffUser;
      ST.editLoan=makeLoan(lo.role==="lo"?lo.nmls:"");
      ST.editTab="info";ST.staffView="edit";renderMain(); break;
    case "openLoan":
      var lid=el.getAttribute("data-id");
      var fl=ST.loans.find(function(l){return l.id===lid;});
      if(fl){ST.editLoan=JSON.parse(JSON.stringify(fl));ST.editTab="info";ST.staffView="edit";renderMain();}
      break;
    case "backDash": ST.staffView="dash";ST.editLoan=null;renderMain(); break;
    case "sETab": ST.editTab=el.getAttribute("data-t");renderMain(); break;
    case "delLoan":
      e.stopPropagation();
      var delId=el.getAttribute("data-id");
      if(confirm("Permanently delete this closed file? This cannot be undone.")){
        ST.loans=ST.loans.filter(function(l){return l.id!==delId;});
        saveLoans();renderMain();
      }
      break;
    case "saveLoan":
      if(!ST.editLoan) break;
      var idx=ST.loans.findIndex(function(l){return l.id===ST.editLoan.id;});
      var smsMs=ST.editLoan.milestone;
      var origLoan=idx>=0?ST.loans[idx]:null;
      var msChanged=origLoan&&origLoan.milestone!==smsMs;
      if(idx>=0) ST.loans[idx]=JSON.parse(JSON.stringify(ST.editLoan));
      else ST.loans.unshift(JSON.parse(JSON.stringify(ST.editLoan)));
      saveLoans();
      if(msChanged){
        var m=findMs(smsMs);var lo2=findLO(ST.editLoan.loNmls);
        var smsText=m.sms+(lo2?" | "+lo2.name+(lo2.nmls&&lo2.nmls!=="TBD"?" NMLS# "+lo2.nmls:""):"");
        ST.smsPrompt={text:smsText,phone:ST.editLoan.borrowerPhone};
        renderModal();
      } else {
        ST.staffView="dash";ST.editLoan=null;renderMain();
      }
      break;
    case "bCond":
      if(ST.editLoan){var id=el.getAttribute("data-id");ST.editLoan.bConds[id]=el.checked;renderMain();}break;
    case "rCond":
      if(ST.editLoan){var rid=el.getAttribute("data-id");ST.editLoan.rConds[rid]=el.checked;renderMain();}break;
    case "cbCond":
      if(ST.editLoan){var ci2=parseInt(el.getAttribute("data-i")||"0");if(ST.editLoan.custB[ci2])ST.editLoan.custB[ci2].checked=el.checked;renderMain();}break;
    case "crCond":
      if(ST.editLoan){var cri=parseInt(el.getAttribute("data-i")||"0");if(ST.editLoan.custR[cri])ST.editLoan.custR[cri].checked=el.checked;renderMain();}break;
    case "addCB":
      if(ST.editLoan){var v=(document.getElementById("newCB")||{}).value||"";if(v.trim()){ST.editLoan.custB.push({id:genId(),l:v.trim(),checked:false});renderMain();}}break;
    case "addCR":
      if(ST.editLoan){var vr=(document.getElementById("newCR")||{}).value||"";if(vr.trim()){ST.editLoan.custR.push({id:genId(),l:vr.trim(),checked:false});renderMain();}}break;
    case "delCB":
      if(ST.editLoan){var di=parseInt(el.getAttribute("data-i")||"0");ST.editLoan.custB.splice(di,1);renderMain();}break;
    case "delCR":
      if(ST.editLoan){var dri=parseInt(el.getAttribute("data-i")||"0");ST.editLoan.custR.splice(dri,1);renderMain();}break;
  }
});
