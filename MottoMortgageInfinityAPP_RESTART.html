<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Motto Mortgage Infinity — Loan Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Aptos,Arial,Helvetica,sans-serif;background:#f4f6fa;color:#282728;min-height:100vh;overflow-x:hidden}
.app{min-height:100vh;overflow-x:hidden}
/* Header */
.hdr{background:linear-gradient(135deg,#003057 0%,#003f72 100%);position:sticky;top:0;z-index:50;border-bottom:3px solid #FA7D00}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;max-width:600px;margin:0 auto;width:100%}
.logo-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:10px;padding:0}
.hdr-user{display:flex;align-items:center;gap:8px}
.hdr-label{color:rgba(255,255,255,0.7);font-size:12px;font-weight:600}
.logout-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif}
/* Main */
.main{width:100%;padding-bottom:80px;min-height:calc(100vh - 80px)}
/* Footer */
footer{background:linear-gradient(135deg,#1a2332,#0d1520);padding:14px 16px;text-align:center}
/* Cards */
.card{background:#fff;border-radius:18px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:12px}
/* Buttons */
.btn{border:none;border-radius:12px;padding:14px 20px;font-size:15px;font-weight:800;cursor:pointer;width:100%;font-family:Arial,sans-serif;letter-spacing:0.02em}
.btn-orange{background:linear-gradient(135deg,#FA7D00,#e06000);color:#fff;box-shadow:0 4px 16px rgba(250,125,0,0.35)}
.btn-navy{background:linear-gradient(135deg,#003057,#00488a);color:#fff}
.btn-green{background:linear-gradient(135deg,#64C887,#38c46e);color:#fff}
/* Forms */
.lbl{display:block;font-size:12px;font-weight:700;color:#666;letter-spacing:0.08em;text-transform:uppercase;margin:12px 0 5px}
.inp{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:11px 14px;font-size:14px;font-family:Arial,sans-serif;color:#282728;outline:none;transition:border-color 0.15s}
.inp:focus{border-color:#FA7D00}
select.inp{cursor:pointer}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(3px)}
.modal-box{background:#fff;border-radius:20px;padding:24px 20px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto}
/* Borrower nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8ecf2;display:flex;z-index:100;max-width:600px;margin:0 auto;box-shadow:0 -4px 20px rgba(0,0,0,0.08)}
.bnav-btn{flex:1;border:none;background:none;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-size:10px;font-weight:600;color:#9aa3b0;font-family:Arial,sans-serif;transition:color 0.15s}
.bnav-btn.active{color:#FA7D00}
.bnav{transition:transform 0.3s ease}
/* Progress */
.progress-bar{background:#e8ecf2;border-radius:6px;height:8px;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,#FA7D00,#e06000);height:100%;border-radius:6px;transition:width 0.5s ease}
/* Conditions */
.pending-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:#FFE3C7;border-radius:10px;font-size:13px;font-weight:700;margin-bottom:8px;line-height:1.4}
.cond-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.cond-row:last-child{border-bottom:none}
/* Staff */
.sec-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.sec-tab{border:1.5px solid #e2e8f0;background:#fff;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:Arial,sans-serif;color:#666}
.sec-tab.active{background:#003057;color:#fff;border-color:#003057}
.loan-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;border:1.5px solid transparent;transition:border-color 0.15s}
.loan-card:hover{border-color:#FA7D00}
/* Urgent alert animation */
@keyframes urgentGlow{0%,100%{box-shadow:0 4px 24px rgba(200,0,0,0.35)}50%{box-shadow:0 6px 48px rgba(220,0,0,0.65),0 0 80px rgba(220,0,0,0.2)}}
.urgent-alert{animation:urgentGlow 3s ease-in-out infinite;background:#fff}
/* FAQ */
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:13px 0;cursor:pointer;font-size:14px;font-weight:700;color:#003057;border-bottom:1px solid #f0f0f0;gap:10px}
.faq-ans{display:none;padding:10px 0 14px;font-size:13px;line-height:1.75;color:#555}
.faq-ans.show{display:block}
/* Road CSS */
.road-strip{position:absolute;left:50%;transform:translateX(-50%);width:44px;top:0;bottom:0;background:linear-gradient(to bottom,#d4c8b8,#c8baa8);border-radius:6px;z-index:0}
.step-row{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;margin-bottom:4px}
.step-inner{display:flex;align-items:center;width:100%;min-height:82px}
.step-inner.left{flex-direction:row}
.step-inner.right{flex-direction:row-reverse}
.step-circle-wrap-left{width:50%;display:flex;justify-content:flex-end;padding-right:27px}
.step-circle-wrap-right{width:50%;display:flex;justify-content:flex-start;padding-left:27px}
.step-circle{border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;position:relative;transition:transform 0.15s;font-family:Arial,sans-serif}
.step-circle.done{background:linear-gradient(135deg,#64C887,#38c46e);border:3px solid #38a060;box-shadow:0 3px 12px rgba(100,200,135,0.4);color:#fff}
.step-circle.current{background:linear-gradient(135deg,#003057,#00488a);border:4px solid #FA7D00;box-shadow:0 0 0 8px rgba(250,125,0,0.15),0 5px 20px rgba(0,48,87,0.35);color:#fff}
.step-circle.future{background:#e8ecf2;border:2.5px solid #d0d6e0;color:#9aa3b0}
.here-tag{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#FA7D00,#e06000);color:#fff;font-size:7px;font-weight:900;border-radius:8px;padding:2px 6px;white-space:nowrap;letter-spacing:0.05em;box-shadow:0 2px 8px rgba(250,125,0,0.4)}
.step-label-left{width:50%;padding-left:12px;padding-right:24px}
.step-label-right{width:50%;padding-right:12px;padding-left:24px;text-align:right}
.step-detail{display:none;background:#f8fafc;border-radius:12px;padding:14px;margin:6px 16px 10px;font-size:14px;line-height:1.75;color:#444}
.step-detail.show{display:block}
.step-detail.done-detail{background:#f0faf4}
.link-btn{background:transparent;border:none;color:#FA7D00;font-size:12px;font-weight:700;cursor:pointer;padding:2px 0;text-decoration:underline;text-underline-offset:2px;font-family:Arial,sans-serif}
textarea.inp{min-height:80px;resize:vertical}
</style>
</head>

const MS=[
  {id:"app_received", s:"Application",         e:"📋",msg:"Your application has been received. We are excited to work with you!",sms:"Your application has been received. We will reach out shortly with your document checklist.",detail:"We have your application! Our team is reviewing your information. Expect a call or email soon with a list of documents we need. No action needed yet."},
  {id:"submitted",    s:"Submitted",            e:"📤",msg:"Submitted to the Lender for Initial Approval.",sms:"Your loan file has been submitted to the lender for underwriting review. We will keep you posted.",detail:"Your complete loan package has been submitted to the lender's underwriting team. They will review your income, credit, and property details. This typically takes a few business days. Respond quickly to any requests."},
  {id:"approval",     s:"Conditional Approval", e:"✅",msg:"Congratulations! You have received a Conditional Approval. You will be hearing from our processing team for items needed. Please be on the lookout for a direct email as well as updates here in the next day or two.",sms:"Your loan has received a Conditional Approval! We are working on clearing the remaining conditions. You will be hearing from our processing team for items needed. Please be on the lookout for a direct email as well as updates here in the next day or two.",detail:"The lender has approved your loan — with conditions to clear first. This is completely normal. Most loans receive conditional approvals. We will work through each condition quickly. It is IMPERATIVE you respond quickly to every document request."},
  {id:"appr_ordered", s:"Appraisal Ordered",    e:"📐",msg:"Your property appraisal has been ordered. The appraiser will contact you to schedule.",sms:"Your property appraisal has been ordered! The appraiser will contact you within a few days to schedule.",detail:"A licensed, independent appraiser has been ordered to visit the property. They confirm the home's market value. By law, lenders must order appraisers from a third-party company — you cannot choose the appraiser."},
  {id:"appr_paid",    s:"Appraisal Paid",       e:"💳",msg:"The appraisal fee has been paid. The appraiser will schedule their visit shortly.",sms:"The appraisal fee has been paid! The appraiser will now schedule their visit to the property.",detail:"The appraisal fee has been collected and the appraiser is scheduling their property visit. This fee is part of your closing costs and is typically paid upfront before the appraisal is conducted."},
  {id:"appr_received",s:"Appraisal Received",   e:"📊",msg:"The appraisal has been received. Your home value has been confirmed!",sms:"The appraisal is back! Your home value has been confirmed. Things are moving along nicely.",detail:"The appraisal report is in and has been reviewed. The property value supports your loan amount — great news! This is a major milestone in your loan process."},
  {id:"title_ordered",s:"Title Ordered",        e:"🔎",msg:"A title search has been ordered on your property.",sms:"A title search has been ordered on the property to confirm clear ownership. No action needed from you.",detail:"A title company is searching public records to confirm the seller has clear ownership and there are no outstanding liens, judgments, or legal issues. Think of it as a background check on the home's ownership history."},
  {id:"title_received",s:"Title Received",      e:"📜",msg:"Title has been received and reviewed. The property has a clean history!",sms:"Title has come back clean! The property has a clear ownership history and is ready to transfer at closing.",detail:"The title search is complete and clear. There are no ownership issues or surprises. The home is ready to be legally transferred to you at closing. Title insurance will be issued to protect you."},
  {id:"ins_quoted",   s:"Insurance Quoted",     e:"🛡️",msg:"Your homeowners insurance quote has been received. Please review and confirm your selection.",sms:"Your homeowners insurance quote is in! Please review your coverage options and confirm your selection.",detail:"Your insurance agent has provided a homeowners insurance quote. Review the coverage carefully — you need at minimum dwelling coverage equal to your loan amount. If the property is in a flood zone, flood insurance is also required."},
  {id:"ins_bound",    s:"Insurance Bound",      e:"🔐",msg:"Your homeowners insurance has been bound and confirmed. You are protected!",sms:"Your homeowners insurance is bound and confirmed on file with the lender. You are protected!",detail:"Your homeowners insurance policy has been bound and the lender has a copy on file. This is required before closing. If your property is in a flood zone, your flood insurance has also been confirmed."},

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");}
function fmtDate(iso){if(!iso)return"";var p=String(iso).split("-");return p.length===3?p[1]+"/"+p[2]+"/"+p[0]:iso;}
function parseDate(s){if(!s)return null;var m=String(s).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(m)return new Date(m[3],m[1]-1,m[2]);var n=String(s).match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);if(n)return new Date(n[1],n[2]-1,n[3]);return null;}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function mIdx(id){const i=MS.findIndex(m=>m.id===id);return i<0?0:i;}
function findMs(id){return MS.find(m=>m.id===id)||MS[0];}
function findLO(nmls){return LOS.find(l=>l.nmls===nmls)||null;}
function findOffice(id){return OFFICES.find(o=>o.id===id)||OFFICES[0];}
function getThemeEmoji(loan,i){const t=EMOJI_THEMES.find(t=>t.id===(loan.loanTheme||"celebrate"));return t?t.emoji[Math.min(i,t.emoji.length-1)]:"⭐";}
function initConds(arr){const o={};arr.forEach(c=>o[c.id]=false);return o;}
function makeLoan(loNmls){
  return{id:genId(),lastName:"",address:"",closingDate:"",officeId:"ftm",loNmls:loNmls||"",loPhone:"",processor:"",
    borrowerPhone:"",borrowerEmail:"",mlsNumber:"",homePhotoUrl:"",
    listingAgentName:"",listingAgentPhone:"",buyerAgentName:"",buyerAgentPhone:"",
    milestone:"app_received",bConds:initConds(BSTD),rConds:initConds(RSTD),
    custB:[],custR:[],bNote:"",rNote:"",notes:"",
    borrowerUser:"",borrowerPass:"",realtorName:"",realtorUser:"",realtorPass:"",
    loanTheme:"celebrate",createdAt:new Date().toISOString()};
}
function saveLoans(){try{localStorage.setItem("mmi_loans",JSON.stringify(ST.loans));}catch(e){}}
function loadLoans(){try{const s=localStorage.getItem("mmi_loans");if(s)ST.loans=JSON.parse(s);}catch(e){}}

// ── Header ────────────────────────────────────────────────────────────────────
function buildHeader(){
  let label="";
  if(ST.session&&ST.session.type==="staff"){
    label=esc(ST.session.staffUser.name)+(ST.session.staffUser.role==="admin"?" (Admin)":" (LO)");
  }
  const userHtml=label?'<div class="hdr-user"><div class="hdr-label">'+label+'</div><button class="logout-btn" data-a="lgOut">Logout</button></div>':"";
  return '<div class="hdr"><div class="hdr-inner" style="justify-content:center;position:relative">'+'<button class="logo-btn" data-a="lgOut" style="flex-direction:column;align-items:center">'+buildMottoLogo()+'</button>'+(userHtml?'<div style="position:absolute;right:16px;top:50%;transform:translateY(-50%)">'+userHtml+'</div>':'')+'</div></div>';
}

// ── Login Screen ───────────────────────────────────────────────────────────────
function buildLogin(type){
  const info={
    borrower:{t:"Borrower Portal",s:"Sign in to track your loan on our roadmap",c:"linear-gradient(135deg,#64C887,#38c46e)"},
    realtor: {t:"Realtor Portal", s:"Sign in to view your client files",          c:"linear-gradient(135deg,#FA7D00,#e06000)"},
    staff:   {t:"Staff Portal",   s:"LO and Admin access",                         c:"linear-gradient(135deg,#007DC3,#0096e6)"},
  }[type];
  if(!info) return "";
  return '<div style="padding:20px 16px"><div style="background:'+info.c+';border-radius:18px;padding:24px 20px;text-align:center;margin-bottom:20px"><div style="color:#fff;font-weight:900;font-size:22px;margin-bottom:4px">'+info.t+'</div><div style="color:rgba(255,255,255,0.8);font-size:13px">'+info.s+'</div></div>'
    +'<div class="card"><button data-a="goBack" style="background:none;border:none;color:#666;font-size:13px;cursor:pointer;font-family:Arial,sans-serif;margin-bottom:14px;padding:0">&lsaquo; Back</button>'
    +'<label class="lbl">Username</label><input class="inp" id="li_u" type="text" placeholder="Enter username" autocomplete="username">'
    +'<label class="lbl">Password</label><input class="inp" id="li_p" type="password" placeholder="Enter password" autocomplete="current-password">'
    +'<div id="li_err" style="color:#cc0000;font-size:13px;font-weight:700;margin:10px 0;display:none">&#9888; Username or password not found.</div>'
    +'<button class="btn btn-orange" style="margin-top:14px" data-a="doLogin" data-t="'+type+'">Sign In &rarr;</button></div></div>';
}

// ── Borrower Home Screen ───────────────────────────────────────────────────────
function buildBorrowerHome(loan){
  const mi=mIdx(loan.milestone);
  const cur=findMs(loan.milestone);
  const prog=Math.round((mi/(MS.length-1))*100);

// ── Road Map (expandable accordion) ─────────────────────────────────────────
function buildRoadMap(loan){
  var mi=mIdx(loan.milestone);
  var cur=findMs(loan.milestone);
  var prog=Math.round((mi/(MS.length-1))*100);

  var h='<div style="background:#f4f6fa;min-height:calc(100vh - 130px);padding:14px 16px">';

  // Header card
  h+='<div style="background:linear-gradient(135deg,#003057,#00488a);border-radius:14px;padding:16px;margin-bottom:14px">';
  h+='<div style="color:#FA7D00;font-size:10px;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:4px">My Loan Progress</div>';
  h+='<div style="color:#fff;font-weight:900;font-size:20px;margin-bottom:6px">Step '+(mi+1)+' of '+MS.length+' &nbsp;·&nbsp; '+esc(cur.s)+'</div>';
  h+='<div style="background:rgba(255,255,255,0.2);border-radius:6px;height:10px;overflow:hidden;margin-bottom:6px">';
  h+='<div style="background:linear-gradient(90deg,#FA7D00,#64C887);height:100%;border-radius:6px;width:'+prog+'%"></div></div>';
  h+='<div style="color:rgba(255,255,255,0.7);font-size:12px">'+prog+'% Complete &nbsp;·&nbsp; Tap any step to expand</div>';
  h+='</div>';

  // Accordion steps
  h+='<div style="display:flex;flex-direction:column;gap:6px">';
  MS.forEach(function(m,i){
    var done=i<mi, isCur=i===mi;
    var emoji=getThemeEmoji(loan,i);
    var num=i<9?'0'+(i+1):''+(i+1);
    var bg=done?'#64C887':isCur?'#FA7D00':'#fff';
    var textCol=done||isCur?'#fff':'#003057';
    var border=isCur?'2px solid #FA7D00':done?'2px solid #38a060':'1.5px solid #e2e8f0';
    var numBg=done?'rgba(255,255,255,0.25)':isCur?'rgba(255,255,255,0.25)':'rgba(0,48,87,0.08)';
    var numCol=done||isCur?'#fff':'#003057';

    h+='<div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.06);border:'+border+'">';
    // Row header — clickable
    h+='<button data-a="tS" data-i="'+i+'" style="width:100%;border:none;background:'+bg+';padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;text-align:left;font-family:Arial,sans-serif">';
    h+='<div style="width:32px;height:32px;border-radius:8px;background:'+numBg+';display:flex;align-items:center;justify-content:center;flex-shrink:0">';
    h+='<span style="color:'+numCol+';font-size:9px;font-weight:900">'+num+'</span></div>';
    h+='<span style="font-size:18px;flex-shrink:0">'+(done?'✅':emoji)+'</span>';
    h+='<div style="flex:1">';
    h+='<div style="font-weight:700;font-size:14px;color:'+textCol+'">'+esc(m.s)+'</div>';
    if(isCur) h+='<div style="font-size:11px;color:rgba(255,255,255,0.8);font-weight:600;margin-top:1px">← You are here</div>';
    if(done)  h+='<div style="font-size:11px;color:rgba(255,255,255,0.75);font-weight:600;margin-top:1px">Complete ✓</div>';
    h+='</div>';
    h+='<div style="color:'+textCol+';opacity:0.7;font-size:16px;font-weight:300">'+(isCur?'▼':'›')+'</div>';
    h+='</button>';
    // Expandable detail (hidden by default, shown via modal for now)
    h+='</div>';
    // Insert "REVIEW US" chevron right after the Clear to Close step
    if(m.id==="ctc"){
      h+='<button data-a="gReview" style="width:100%;border:2px solid #FA7D00;background:linear-gradient(135deg,#003057,#00488a);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;text-align:left;font-family:Arial,sans-serif;box-shadow:0 4px 16px rgba(250,125,0,0.25)">'
        +'<span style="font-size:24px;flex-shrink:0">🏆</span>'
        +'<div style="flex:1">'
        +'<div style="color:#FA7D00;font-weight:900;font-size:14px;letter-spacing:0.05em">REVIEW US</div>'
        +'<div style="color:rgba(255,255,255,0.85);font-size:11px;font-weight:600;margin-top:1px">Tap to leave a Google review</div>'
        +'</div>'
        +'<div style="color:#FA7D00;font-size:18px;font-weight:300">›</div>'

      :'<div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#003057,#007DC3);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;flex-shrink:0">'+initials+'</div>';
    return '<div style="display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid #f0f0f0">'+avatar
      +'<div style="flex:1"><div style="font-weight:800;font-size:16px;color:#282728">'+esc(l.name)+'</div>'
      +'<div style="font-size:12px;color:#888;margin-bottom:3px">'+esc(l.title)+(l.nmls&&l.nmls!=="TBD"?" | NMLS# "+l.nmls:"")+'</div>'
      +'<div style="font-size:11px;color:#aaa;margin-bottom:5px">📍 4048 Evans Ave, Suite 303 · Fort Myers, FL 33901</div>'
      +(l.phone?'<a href="tel:'+l.phone.replace(/\D/g,"")+'" style="color:#007DC3;font-weight:700;font-size:14px;text-decoration:none">'+l.phone+'</a>':"")
      +(l.email?'<div style="font-size:12px;color:#888;margin-top:2px">'+esc(l.email)+'</div>':"")
      +'</div></div>';
  }).join("");
  return '<div style="padding:14px 16px;background:#f4f6fa;min-height:calc(100vh - 130px)">'
    +(standalone?'<div style="background:linear-gradient(135deg,#003057,#00488a);border-radius:14px;padding:18px 16px;margin-bottom:14px"><div style="color:#FA7D00;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:6px">Contact</div><div style="color:#fff;font-weight:900;font-size:22px">Our Offices</div></div>':"")
    +officeHtml
    +'<div class="card"><div style="font-size:11px;font-weight:700;color:#FA7D00;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px">Our Licensed Loan Originators</div>'+teamHtml+'</div>'
    +'<div style="margin-top:10px;text-align:center;padding:12px;background:rgba(0,48,87,0.05);border-radius:12px;font-size:11px;color:#888;line-height:1.6">'
    +'<svg width="20" height="20" viewBox="0 0 24 24" fill="#003057" style="vertical-align:middle;margin-right:4px"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>'
    +'Equal Housing Opportunity<br>Each Office is Independently Owned, Operated, and Licensed.</div>'
    +'</div>'
    +(standalone?buildHomeStripInline('goBack'):'');
}

// ── FAQ Toggle ────────────────────────────────────────────────────────────────
function toggleFaq(ci,qi){
  var id='fa'+ci+'_'+qi;
  var ans=document.getElementById(id);
  var icon=document.getElementById('ft'+ci+'_'+qi);
  if(!ans) return;
  var open=ans.classList.contains('show');
  // Close all
  document.querySelectorAll('.faq-ans.show').forEach(function(el){el.classList.remove('show');});
  document.querySelectorAll('[id^="ft"]').forEach(function(el){el.textContent='+';});
  if(!open){ans.classList.add('show');if(icon)icon.textContent='−';}
}


// ── FAQ ───────────────────────────────────────────────────────────────────────
function buildFAQ(){
  var cats=[
    {t:"The Mortgage Process",qs:[
      ["What are the steps in the mortgage process?","Application → Submission to Lender → Conditional Approval → Appraisal (Ordered, Paid, Received) → Title (Ordered, Received) → Insurance (Quoted, Bound) → Conditions Clearing → CD Sent → CD Signed → Clear to Close → Closing Scheduled → Closed. Each step is tracked on your roadmap."],
      ["How long does the process take?","A typical purchase mortgage takes 30-45 days from application to closing. We keep things moving — respond quickly to all document requests to avoid delays."],
      ["What happens after I submit my application?","We review your file, order your credit report, and submit your loan to the lender. You'll receive a document checklist within 1-2 business days."],
    ]},
    {t:"Qualifying",qs:[
      ["What credit score do I need?","Conventional loans typically require 620+. FHA loans can go as low as 580. VA and USDA loans have flexible requirements. We shop multiple lenders to find the best fit for your situation."],
      ["How much down payment do I need?","FHA: 3.5% down. Conventional: as low as 3-5%. VA and USDA: 0% down for qualified buyers. Down payment assistance programs may be available in your area."],
      ["What is a debt-to-income ratio?","Your DTI is your monthly debt payments divided by your gross monthly income. Most lenders prefer 43% or below. We'll calculate yours during the application process."],
    ]},
    {t:"Your Documents",qs:[
      ["What documents do I need?","ALL documents must be submitted in PDF format — clear, legible, ALL pages. No screenshots accepted. Required: Driver's License, Social Security Card, W-2s (last 2 years), Pay Stubs (1 full month), Bank Statements (last 2 months, ALL pages, ALL accounts), Federal Tax Returns (last 2 years, ALL schedules). Self-employed: add Business License, Business Returns, P&L Statement."],
      ["Why PDF only?","Lenders require PDFs for all documents. Screenshots are blurry, miss pages, and will be rejected — causing delays. Always download the official PDF from your bank or employer portal."],
      ["How do I submit documents?","Your loan officer will provide a secure upload link. You can also email documents directly to your loan officer."],
    ]},
    {t:"Understanding Costs",qs:[
      ["What are closing costs?","Closing costs typically run 2-5% of the loan amount and include lender fees, title insurance, appraisal, prepaid interest, homeowners insurance, and property taxes. You'll receive a detailed Loan Estimate at application and a Closing Disclosure at least 3 days before closing."],
      ["What is an appraisal?","An independent appraisal confirms the home's market value. The fee (typically $400-$600) is usually paid upfront. Lenders require it to ensure the home is worth the loan amount."],
      ["What is title insurance?","Title insurance protects you from past ownership claims, liens, or legal issues with the property. It's a one-time premium paid at closing."],

      ["What is underwriting?","Underwriting is the process where a licensed underwriter reviews your complete loan file to verify income, assets, credit, and the property. They determine whether the loan meets the lender's guidelines and issue a decision: Approved, Approved with Conditions, or Suspended/Denied."],
      ["What does \"Approved with Conditions\" mean?","Almost all loans are approved with conditions. This simply means the underwriter needs additional documentation or clarification before final approval. Common conditions include updated pay stubs, a letter of explanation for a deposit, or additional insurance documents. Respond to all condition requests as quickly as possible."],
      ["Why is the underwriter asking for more documents?","Underwriters must verify every aspect of your loan file to protect both you and the lender. Additional requests are normal — do not be alarmed. Submit everything in PDF format, all pages, clearly legible."],
      ["How long does underwriting take?","Initial underwriting typically takes 2-5 business days. If conditions are issued, the clock resets when you submit your response. The fastest way through underwriting is to respond to all requests within 24 hours with complete, clear PDFs."],
    ]},
    {t:"5 Tips for a Smooth Closing",color:"#64C887",qs:[
      ["Don't make any large deposits or withdrawals","All unusual bank activity must be explained in writing. Keep your financial activity normal throughout the entire loan process."],
      ["Don't make any major purchases","No new cars, furniture, or appliances on credit until after closing. New debt can change your debt-to-income ratio and jeopardize your loan."],
      ["Don't change jobs during the process","Employment changes must be disclosed immediately. A job change can affect your qualifying income."],
      ["Respond quickly to all requests","Every day of delay costs you time and potentially money. Respond to requests within 24 hours."],
      ["Don't apply for new credit","Each new credit inquiry can lower your score and affect your loan terms. Wait until after closing."],
    ]},

function buildPostClose(){
  return '<div style="padding:14px 16px;background:#f4f6fa;min-height:calc(100vh - 130px)">'
    +'<div style="background:linear-gradient(135deg,#64C887,#38c46e);border-radius:14px;padding:20px 16px;margin-bottom:14px">'
    +'<div style="color:rgba(255,255,255,0.7);font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:6px">After Closing</div>'
    +'<div style="color:#fff;font-weight:900;font-size:22px;margin-bottom:4px">🏠 Welcome Home!</div>'
    +'<div style="color:rgba(255,255,255,0.85);font-size:13px">Important steps for new homeowners</div></div>'
    +'<div class="card" style="margin-bottom:12px"><div style="font-weight:800;font-size:15px;color:#003057;margin-bottom:8px">💳 First Payment</div><div style="font-size:14px;line-height:1.75;color:#555">Your first mortgage payment is typically due on the 1st of the SECOND month after closing. Example: If you close in January, your first payment is due March 1st. You will receive a welcome letter from your lender with payment instructions.</div></div>'
    +'<div class="card" style="margin-bottom:12px"><div style="font-weight:800;font-size:15px;color:#003057;margin-bottom:8px">📬 Mortgage Transfer</div><div style="font-size:14px;line-height:1.75;color:#555">Your loan may be sold to another servicer — this is normal and your loan terms do not change. Watch for a notice in the mail. Continue making payments to your original servicer until you receive confirmation of the transfer.</div></div>'
    +'<div class="card" style="margin-bottom:12px"><div style="font-weight:800;font-size:15px;color:#003057;margin-bottom:8px">🏦 Escrow Account</div><div style="font-size:14px;line-height:1.75;color:#555">If your loan includes an escrow account, your monthly payment covers principal, interest, property taxes, and homeowners insurance. Your servicer pays your taxes and insurance from this account.</div></div>'
    +'<div class="card" style="margin-bottom:12px;border:2px solid #FA7D00"><div style="font-weight:800;font-size:15px;color:#FA7D00;margin-bottom:8px">⭐ Florida Homestead Exemption</div><div style="font-size:14px;line-height:1.75;color:#555">Apply by <strong>March 1st</strong> to save hundreds per year on property taxes! Visit your county property appraiser website:<br><br><a href="https://www.leepa.org" target="_blank" style="color:#007DC3;font-weight:700">leepa.org</a> (Lee County)<br><a href="https://www.collierappraiser.com" target="_blank" style="color:#007DC3;font-weight:700">collierappraiser.com</a> (Collier County)<br><a href="https://www.charlottecountypa.gov" target="_blank" style="color:#007DC3;font-weight:700">charlottecountypa.gov</a> (Charlotte County)</div></div>'
    +'<div class="card" style="margin-bottom:12px"><div style="font-weight:800;font-size:15px;color:#cc0000;margin-bottom:8px">⚠ Beware of Solicitations</div><div style="font-size:14px;line-height:1.75;color:#555">After closing, your information becomes public record. You may receive mail or calls offering mortgage protection insurance, refinancing, or other services. Be cautious — contact us before making any changes to your mortgage.</div></div>'
    +'</div>';
}

function buildStaffDash(){
  var user=ST.session.staffUser;
  var isAdmin=user.role==="admin";
  var loans=isAdmin?ST.loans:ST.loans.filter(function(l){return l.loNmls===user.nmls;});
  var html='<div style="padding:14px 16px;background:transparent;min-height:100vh">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
    +'<div><div style="font-weight:900;font-size:20px;color:#003057">Loan Files</div><div style="font-size:12px;color:#888">'+loans.length+' file'+(loans.length!==1?"s":"")+(isAdmin?"":" assigned to you")+'</div></div>'
    +'<button class="btn btn-orange" style="width:auto;padding:10px 16px;font-size:13px" data-a="newLoan">+ New File</button></div>';
  if(loans.length===0){
    html+='<div class="card" style="text-align:center;padding:32px"><div style="font-size:36px;margin-bottom:10px">📋</div><div style="font-weight:700;color:#666">No loan files yet</div><div style="font-size:13px;color:#aaa;margin-top:4px">Click + New File to get started</div></div>';
  } else {
    loans.forEach(function(loan){
      var mi=mIdx(loan.milestone);
      var cur=findMs(loan.milestone);
      var prog=Math.round((mi/(MS.length-1))*100);
      var lo=findLO(loan.loNmls);
      var pendingCnt=BSTD.filter(function(c){return !(loan.bConds&&loan.bConds[c.id]);}).length+(loan.custB||[]).filter(function(c){return !c.checked;}).length;
      html+='<div class="loan-card" data-a="openLoan" data-id="'+loan.id+'">'
        +'<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">'
        +'<div><div style="font-weight:800;font-size:16px;color:#003057">'+esc(loan.lastName)+' Family</div>'
        +'<div style="font-size:12px;color:#888">'+esc(loan.address||"No address set")+'</div>'
        +(lo?'<div style="font-size:11px;color:#aaa">LO: '+esc(lo.name)+'</div>':"")+'</div>'
        +'<div style="text-align:right"><div style="background:linear-gradient(135deg,#64C887,#38c46e);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;margin-bottom:4px">'+prog+'%</div>'
        +(pendingCnt>0?'<div style="background:#fff0f0;color:#cc0000;font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px">'+pendingCnt+' pending</div>':"")+'</div></div>'
        +'<div style="display:flex;align-items:center;gap:8px">'
        +'<span style="background:#e8f4ff;color:#003057;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px">'+getThemeEmoji(loan,mi)+' '+esc(cur.s)+'</span>'
        +(loan.closingDate?'<span style="background:#f0f0f0;color:#666;font-size:11px;padding:3px 8px;border-radius:6px">Close: '+fmtDate(loan.closingDate)+'</span>':"")
        +'</div></div>';
    });
  }
  return html+buildHomeStripInline('lgOut')+'</div>';
}

// ── Loan Editor ───────────────────────────────────────────────────────────────

  var msOpts=MS.map(function(m){return '<option value="'+m.id+'"'+(loan.milestone===m.id?" selected":"")+'>'+m.s+'</option>';}).join("");

      +'<label class="lbl">Borrower Phone</label><input class="inp" type="tel" value="'+esc(loan.borrowerPhone)+'" placeholder="(239) 555-1234" data-field="borrowerPhone">'
      +'<label class="lbl">Borrower Email</label><input class="inp" type="email" value="'+esc(loan.borrowerEmail)+'" placeholder="email@example.com" data-field="borrowerEmail">'
      +'<label class="lbl">Current Milestone</label><select class="inp" data-field="milestone">'+msOpts+'</select>'
      +'<div style="background:#e8f4ff;border:1.5px solid #007DC3;border-radius:10px;padding:10px 14px;margin-top:14px;margin-bottom:4px;font-size:12px;color:#004a8a;font-weight:700">🤝 Realtor Information</div>'
      +'<label class="lbl">Listing Agent Name <span style="color:#9aa3b0;font-weight:400">(Seller\'s Agent)</span></label><input class="inp" type="text" value="'+esc(loan.listingAgentName||"")+'" placeholder="e.g. Mary Johnson" data-field="listingAgentName">'
      +'<label class="lbl">Listing Agent Phone</label><input class="inp" type="tel" value="'+esc(loan.listingAgentPhone||"")+'" placeholder="(239) 555-5678" data-field="listingAgentPhone">'
      +'<label class="lbl" style="margin-top:10px">Buyer\'s Agent Name <span style="color:#9aa3b0;font-weight:400">(Your Client\'s Agent)</span></label><input class="inp" type="text" value="'+esc(loan.buyerAgentName||"")+'" placeholder="e.g. John Smith" data-field="buyerAgentName">'
      +'<label class="lbl">Buyer\'s Agent Phone</label><input class="inp" type="tel" value="'+esc(loan.buyerAgentPhone||"")+'" placeholder="(239) 555-1234" data-field="buyerAgentPhone">';
  } else if(ST.editTab==="logins"){
    body='<div style="background:#fff7e6;border:1.5px solid #FA7D00;border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px;color:#7a4000">Set login credentials for the borrower and realtor portals.</div>'

      +'<label class="lbl">Realtor Password</label><input class="inp" type="text" value="'+esc(loan.realtorPass)+'" placeholder="e.g. realtor2024" data-field="realtorPass">';
  } else if(ST.editTab==="borrower"){
    var bCondsHtml=BSTD.map(function(c){return '<div class="cond-row"><input type="checkbox" id="bc_'+c.id+'" '+(loan.bConds&&loan.bConds[c.id]?"checked":"")+' data-a="bCond" data-id="'+c.id+'" style="width:18px;height:18px;cursor:pointer"><label for="bc_'+c.id+'" style="flex:1;cursor:pointer">'+esc(c.l)+'</label></div>';}).join("");
    var custBHtml=(loan.custB||[]).map(function(c,i){return '<div class="cond-row"><input type="checkbox" id="cbc_'+i+'" '+(c.checked?"checked":"")+' data-a="cbCond" data-i="'+i+'" style="width:18px;height:18px;cursor:pointer"><label for="cbc_'+i+'" style="flex:1;cursor:pointer">'+esc(c.l)+'</label><button data-a="delCB" data-i="'+i+'" style="background:none;border:none;color:#cc0000;cursor:pointer;font-size:16px">×</button></div>';}).join("");
    body='<div style="font-weight:700;font-size:14px;color:#003057;margin-bottom:10px">Document Checklist</div>'+bCondsHtml

      +'<label class="lbl" style="margin-top:16px">Message to Borrower</label><textarea class="inp" data-field="bNote" placeholder="Optional message shown on their home screen...">'+esc(loan.bNote)+'</textarea>';

    body='<div style="font-weight:700;font-size:14px;color:#003057;margin-bottom:10px">Realtor Checklist</div>'+rCondsHtml

      +'<label class="lbl" style="margin-top:16px">Message to Realtor</label><textarea class="inp" data-field="rNote" placeholder="Optional message for the realtor portal...">'+esc(loan.rNote)+'</textarea>';
  } else if(ST.editTab==="notes"){
    body='<label class="lbl">Internal Notes (Staff Only)</label><textarea class="inp" style="min-height:200px" data-field="notes" placeholder="Internal notes not visible to borrower or realtor...">'+esc(loan.notes)+'</textarea>';
  }
  return '<div style="padding:14px 16px;background:transparent;min-height:100vh">'
    +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">'
    +'<button data-a="backDash" style="background:none;border:none;color:#666;font-size:13px;cursor:pointer;font-family:Arial,sans-serif;padding:0">&lsaquo; Dashboard</button>'
    +'<div style="flex:1"><div style="font-weight:900;font-size:18px;color:#003057">'+(loan.lastName?esc(loan.lastName)+" Family":"New Loan File")+'</div>'
    +'<div style="font-size:12px;color:#888">'+esc(loan.address||"No address")+'</div></div>'
    +'<button class="btn btn-orange" style="width:auto;padding:10px 16px;font-size:13px" data-a="saveLoan">Save</button></div>'
    +tabHtml+'<div class="card">'+body+'</div>'+buildHomeStripInline('lgOut')+'</div>';
}

function buildBorrowerChecklist(loan){
  var pending=[...BSTD.filter(function(c){return !(loan.bConds&&loan.bConds[c.id]);}),
               ...(loan.custB||[]).filter(function(c){return !c.checked;})];
  return '<div style="padding:14px 16px;background:#f4f6fa;min-height:calc(100vh - 130px)">'
    +'<div class="card" style="border:2.5px solid #cc0000;box-shadow:0 0 18px rgba(200,0,0,0.18)">'
    +'<div style="font-weight:900;font-size:16px;color:#cc0000;margin-bottom:8px">⚠ Action Required</div>'
    +'<div style="color:#666;font-size:13px;margin-bottom:10px;line-height:1.5">Please provide the following — <strong>PDF format only</strong>, no screenshots, all pages included.</div>'
    +pending.map(function(c){return '<div class="pending-item"><span style="color:#FA7D00;font-size:16px;flex-shrink:0">●</span>'+esc(c.l||c.label)+'</div>';}).join("")
    +'</div></div>'+buildHomeStripInline('sBTab');
}

function renderModal(){
  var modal=document.getElementById("modal");
  if(ST.smsPrompt){
    var p=ST.smsPrompt;
    modal.innerHTML='<div class="modal-overlay" data-a="cM-overlay"><div class="modal-box">'
      +'<div style="font-size:28px;text-align:center;margin-bottom:10px">📱</div>'
      +'<div style="font-weight:800;font-size:16px;color:#003057;margin-bottom:4px;text-align:center">Send Update to Borrower?</div>'
      +'<div style="font-size:13px;color:#666;margin-bottom:12px;text-align:center">Tap to open your Messages app</div>'
      +'<div style="background:#f4f6fa;border-radius:10px;padding:12px;font-size:13px;line-height:1.75;color:#444;margin-bottom:16px">'+esc(p.text)+'</div>'
      +(p.phone?'<a href="sms:'+p.phone+'?body='+encodeURIComponent(p.text)+'" class="btn btn-green" style="display:block;text-align:center;text-decoration:none;padding:14px;margin-bottom:8px">📲 Open Messages</a>':"")
      +'<button data-a="cM" class="btn" style="background:#e8ecf2;color:#666">Dismiss</button>'
      +'</div></div>';
    modal.style.display="block";
  } else {
    modal.style.display="none";
    modal.innerHTML="";
  }
}

function renderMain(){
  var main=document.getElementById("main");
  var v=ST.view;
  if(v==="landing"){
    main.style.maxWidth="none";
    main.style.margin="0";
    document.body.style.background="#0c1a2e";
    main.innerHTML=buildLandingPage();
    return;
  }
  main.style.maxWidth="";main.style.margin="";document.body.style.background="#f4f6fa";
if(v.endsWith("-login")){
    main.innerHTML=buildLogin(v.replace("-login",""));
  } else if(v==="contact"){
    main.innerHTML=buildContactPage(true,null);
  } else if(v==="borrower"){
    var loan=ST.loans.find(function(l){return l.id===ST.session.loanId;});
    if(loan){
      if(ST.bTab==="map"&&!ST.session.showChecklist) main.innerHTML=buildBorrowerView(loan);
      else if(ST.session.showChecklist){main.innerHTML=buildBorrowerChecklist(loan);}
      else main.innerHTML=buildBorrowerView(loan);
    }
  } else if(v==="realtor"){
    main.innerHTML=buildRealtorView();
  } else if(v==="staff"){
    if(ST.staffView==="dash") main.innerHTML=buildStaffDash();
    else if(ST.staffView==="edit"&&ST.editLoan) main.innerHTML=buildEditor(ST.editLoan);
  }
  renderModal();
}

function render(){
  document.getElementById("hdr").innerHTML=buildHeader();
  renderMain();
  document.getElementById("ftr").innerHTML=buildFooter();
  setTimeout(function(){document.dispatchEvent(new Event("scroll"));},0);
}

// ── Auth ──────────────────────────────────────────────────────────────────────
function doLogin(type){
  var u=(document.getElementById("li_u")||{}).value||"";
  var p=(document.getElementById("li_p")||{}).value||"";
  var err=document.getElementById("li_err");
  if(type==="staff"){
    var su=STAFF.find(function(s){return s.u===u&&s.p===p;});
    if(su){ST.session={type:"staff",staffUser:su};ST.view="staff";ST.staffView="dash";render();}
    else{if(err)err.style.display="block";}
  } else if(type==="borrower"){
    var loan=ST.loans.find(function(l){return l.borrowerUser===u&&l.borrowerPass===p;});
    if(loan){ST.session={type:"borrower",loanId:loan.id,username:u};ST.bTab="home";ST.view="borrower";render();}
    else{if(err)err.style.display="block";}
  } else if(type==="realtor"){
    var rl=ST.loans.find(function(l){return l.realtorUser===u&&l.realtorPass===p;});
    if(rl){ST.session={type:"realtor",username:u};ST.view="realtor";render();}
    else{if(err)err.style.display="block";}
  }
}
function goLanding(){ST.session=null;ST.view="landing";ST.bTab="home";ST.realtorSelId=null;ST.editLoan=null;ST.staffView="dash";ST.smsPrompt=null;render();}
function doLogout(){goLanding();}
function setBTab(t){ST.bTab=t;ST.session.showChecklist=false;renderMain();}
function setRealtorSel(id){ST.realtorSelId=id;renderMain();}
function showApp(p){ST.view=p+"-login";render();}
function showLandingStatic(){ST.view="landing";render();}
function goLogin(t){ST.view=t+"-login";render();}

// ── Click Handler ─────────────────────────────────────────────────────────────
document.addEventListener("click",function(e){
  var el=e.target.closest("[data-a]");
  if(!el) return;
  var a=el.getAttribute("data-a");
  switch(a){
    case "lgOut": doLogout(); break;
    case "goBorrower": showApp("borrower"); break;
    case "goRealtor":  showApp("realtor");  break;
    case "goStaff":    showApp("staff");    break;
    case "goContact":  ST.view="contact"; render(); break;
    case "goBack": showLandingStatic(); render(); break;
    case "doLogin": doLogin(el.getAttribute("data-t")); break;
    case "sBTab": setBTab(el.getAttribute("data-t")); break;
    case "selR": setRealtorSel(el.getAttribute("data-id")); break;
    case "tS": toggleStep(parseInt(el.getAttribute("data-i")||"0")); break;
    case "gReview": window.open("https://g.page/r/CY4Io13bpu5eEBM/review","_blank"); break;
    case "cM": case "cM-overlay": ST.smsPrompt=null;renderModal(); break;
    case "newLoan":
      var lo=ST.session.staffUser;
      ST.editLoan=makeLoan(lo.role==="lo"?lo.nmls:"");
      ST.editTab="info";ST.staffView="edit";renderMain(); break;
    case "openLoan":
      var lid=el.getAttribute("data-id");
      var fl=ST.loans.find(function(l){return l.id===lid;});
      if(fl){ST.editLoan=JSON.parse(JSON.stringify(fl));ST.editTab="info";ST.staffView="edit";renderMain();}
      break;
    case "backDash": ST.staffView="dash";ST.editLoan=null;renderMain(); break;
    case "sETab": ST.editTab=el.getAttribute("data-t");renderMain(); break;
    case "saveLoan":
      if(!ST.editLoan) break;
      var idx=ST.loans.findIndex(function(l){return l.id===ST.editLoan.id;});
      var smsMs=ST.editLoan.milestone;
      var origLoan=idx>=0?ST.loans[idx]:null;
      var msChanged=origLoan&&origLoan.milestone!==smsMs;
      if(idx>=0) ST.loans[idx]=JSON.parse(JSON.stringify(ST.editLoan));
      else ST.loans.unshift(JSON.parse(JSON.stringify(ST.editLoan)));
      saveLoans();
      if(msChanged){
        var m=findMs(smsMs);var lo2=findLO(ST.editLoan.loNmls);
        var smsText=m.sms+(lo2?" — "+lo2.name+(lo2.nmls&&lo2.nmls!=="TBD"?" NMLS# "+lo2.nmls:""):"");
        ST.smsPrompt={text:smsText,phone:ST.editLoan.borrowerPhone};
        renderModal();
      } else {
        ST.staffView="dash";ST.editLoan=null;renderMain();
      }
      break;
    case "bCond":
      if(ST.editLoan){var id=el.getAttribute("data-id");ST.editLoan.bConds[id]=el.checked;renderMain();}break;
    case "rCond":
      if(ST.editLoan){var rid=el.getAttribute("data-id");ST.editLoan.rConds[rid]=el.checked;renderMain();}break;
    case "cbCond":
      if(ST.editLoan){var ci2=parseInt(el.getAttribute("data-i")||"0");if(ST.editLoan.custB[ci2])ST.editLoan.custB[ci2].checked=el.checked;renderMain();}break;
    case "crCond":
      if(ST.editLoan){var cri=parseInt(el.getAttribute("data-i")||"0");if(ST.editLoan.custR[cri])ST.editLoan.custR[cri].checked=el.checked;renderMain();}break;
    case "addCB":
      if(ST.editLoan){var v=(document.getElementById("newCB")||{}).value||"";if(v.trim()){ST.editLoan.custB.push({id:genId(),l:v.trim(),checked:false});renderMain();}}break;
    case "addCR":
      if(ST.editLoan){var vr=(document.getElementById("newCR")||{}).value||"";if(vr.trim()){ST.editLoan.custR.push({id:genId(),l:vr.trim(),checked:false});renderMain();}}break;
    case "delCB":
      if(ST.editLoan){var di=parseInt(el.getAttribute("data-i")||"0");ST.editLoan.custB.splice(di,1);renderMain();}break;
    case "delCR":
      if(ST.editLoan){var dri=parseInt(el.getAttribute("data-i")||"0");ST.editLoan.custR.splice(dri,1);renderMain();}break;
  }
});

// ── Input change handler ──────────────────────────────────────────────────────
document.addEventListener("input",function(e){
  var el=e.target.closest("[data-field]");
  if(el&&ST.editLoan){
    var field=el.getAttribute("data-field");
    ST.editLoan[field]=el.value;
  }
});
document.addEventListener("keydown",function(e){
  if(e.key==="Enter"&&ST.view.endsWith("-login")){doLogin(ST.view.replace("-login",""));}
});

// ── Init ──────────────────────────────────────────────────────────────────────
loadLoans();
requestAnimationFrame(function(){
try{render();}catch(err){
  document.getElementById('main').innerHTML='<div style="padding:24px;background:#0c1a2e;min-height:100vh;color:#fff"><div style="background:#FA7D00;border-radius:12px;padding:16px;margin-bottom:16px;font-weight:700;font-size:15px">⚠ App Error:</div><pre style="background:rgba(255,255,255,0.1);padding:16px;border-radius:8px;font-size:12px;white-space:pre-wrap;color:#fff">'+err.stack+'</pre></div>';
}
});
// ── Bnav show only at bottom of page ─────────────────────────────────────────
(function(){
  function checkBottom(){
    var nb=document.querySelector('[style*="position:fixed"][style*="bottom:0"]');
    if(!nb)return;
    var atBottom=(window.innerHeight+window.scrollY)>=(document.documentElement.scrollHeight-100);
    nb.style.transform=atBottom?'translateY(0)':'translateY(110%)';
    nb.style.transition='transform 0.3s ease';
  }
  document.addEventListener('scroll',checkBottom,true);
})();

</script>
